org.gradle.jvmargs=-Xmx12G -XX:MaxMetaspaceSize=8G -XX:ReservedCodeCacheSize=1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true

# Stability for release builds when project and Pub cache are on different drives (E: vs C:)
kotlin.incremental=false
kotlin.caching.enabled=false
kotlin.compiler.execution.strategy=in-process
org.gradle.caching=false
org.gradle.parallel=true
org.gradle.configureondemand=true
