name: o2_waifu
description: "O2-WAIFU: A High-Performance, State-Aware, Multi-Model Neural Assistant"
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking & API
  http: ^1.2.0
  dio: ^5.4.0

  # State & Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.2

  # Environment
  flutter_dotenv: ^5.1.0

  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Audio
  audioplayers: ^6.0.0
  record: ^5.1.0

  # Auth & Security
  local_auth: ^2.2.0

  # Firebase (for Firestore mood sync)
  cloud_firestore: ^5.0.0
  firebase_core: ^3.0.0

  # Google Drive
  googleapis: ^13.0.0
  googleapis_auth: ^1.6.0
  google_sign_in: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Device info
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.1
  connectivity_plus: ^6.0.3

  # Permissions
  permission_handler: ^11.3.0

  # Image handling
  image_picker: ^1.0.7

  # URL launcher
  url_launcher: ^6.2.4

  # UUID
  uuid: ^4.3.3

  # Intl
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/img/
    - assets/sounds/
