name: anime_waifu
description: A Voice AI assistant with continuous listening, TTS, STT, and conversation memory.
publish_to: "none"
version: 10.0.2

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^6.0.1
  uuid: ^4.5.1
  http: ^1.2.0
  flutter_tts: ^4.2.3
  shared_preferences: ^2.5.5
  intl: ^0.20.1
  audioplayers: ^6.0.0
  flutter_onnxruntime: ^1.7.0
  record: ^6.0.0
  speech_to_text: ^7.3.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  google_fonts: ^8.0.2
  video_player: ^2.11.1
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  local_auth: ^3.0.1
  flutter_contacts: ^2.0.0
  just_audio: ^0.10.5
  on_audio_query: ^2.9.0
  audio_service: ^0.18.18
  home_widget: ^0.9.1
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0

  firebase_auth: ^6.4.0
  google_sign_in: ^6.3.0
  html: ^0.15.6
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.3.1

  chewie: ^1.13.1
  flutter_inappwebview: ^6.1.5
  sensors_plus: ^7.0.0
  provider: ^6.1.2
  file_picker: ^10.3.10
  connectivity_plus: ^6.1.4
  web_socket_channel: ^3.0.3
  mobile_scanner: ^6.0.11
  qr_flutter: ^4.1.0
  android_intent_plus: ^6.0.0

  model_viewer_plus: ^1.10.0
  sqflite: ^2.4.2
  path: ^1.9.1
  receive_sharing_intent: ^1.8.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  glassmorphism: ^3.0.0
  workmanager: ^0.9.0+3
  android_alarm_manager_plus: ^4.0.7
  flutter_local_notifications: ^21.0.0
  crypto: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4   # Add this for launcher icon generation

flutter:
  uses-material-design: true

  # Keep wake-word models under assets/wakeword for stable release loading.
  assets:
    - assets/
    - assets/img/
    - assets/gif/background_of_about_section_blurry.gif
    - assets/gif/debug_area.gif
    - assets/gif/notification.gif
    - assets/gif/sidebar_bg.gif
    - assets/gif/sidebar_top.gif
    - assets/wakeword/
    - assets/template/
    - assets/models/anime_woman_model.glb
    - assets/sounds/
    - .env

# Launcher icon config
flutter_icons:
  android: true
  ios: true
  image_path: "assets/img/logi.jpg"
