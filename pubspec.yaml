name: anime_waifu
description: A Voice AI assistant with continuous listening, TTS, STT, and conversation memory.
publish_to: "none"
version: 5.0.2+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^6.0.0
  uuid: ^4.5.1
  http: ^1.2.0
  flutter_tts: ^4.2.3
  shared_preferences: ^2.5.5
  intl: ^0.20.1
  audioplayers: ^6.0.0
  flutter_onnxruntime: ^1.6.3
  record: ^6.0.0
  speech_to_text: ^7.3.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  google_fonts: ^8.0.2
  video_player: ^2.11.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  local_auth: ^3.0.1
  flutter_contacts: ^2.0.0
  android_alarm_manager_plus: ^5.0.0
  android_intent_plus: ^6.0.0
  just_audio: ^0.10.5
  on_audio_query: ^2.9.0
  audio_service: ^0.18.18
  home_widget: ^0.9.0
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3

  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1
  html: ^0.15.6
  cached_network_image: ^3.4.1

  chewie: ^1.13.0
  flutter_inappwebview: ^6.1.5
  sensors_plus: ^7.0.0
  provider: ^6.1.2
  file_picker: ^10.3.10
  web_socket_channel: ^3.0.3
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

  model_viewer_plus: ^1.10.0
  sqflite: ^2.4.2
  path: ^1.9.1
  receive_sharing_intent: ^1.8.1
  # firebase_crashlytics and firebase_analytics were removed as they conflict
  # with firebase_core ^4.5.0 used by cloud_firestore ^6.1.3.
  # To add crash reporting: upgrade all Firebase packages together to the same
  # BoM version. Run: flutter pub upgrade --major-versions firebase_core
 # This is a dependency of porcupine_flutter, might be implicitly added
  # ... other packages


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4   # Add this for launcher icon generation

flutter:
  uses-material-design: true

  # Keep wake-word models under assets/wakeword for stable release loading.
  assets:
    - assets/
    - assets/img/
    - assets/gif/
    - assets/wakeword/
    - assets/template/
    - assets/models/
    - .env

# Launcher icon config
flutter_icons:
  android: true
  ios: true
  image_path: "assets/img/logi.jpg"
